name: Build NXGS Gaming Windows arm64 portable (VC)

on:
  workflow_dispatch:

jobs:
  build-win_arm64:
    name: Build NXGS Gaming win_arm64 (VC)
    runs-on: windows-11-arm
    env:
      CC: clang-cl.exe
      CXX: clang-cl.exe
      VULKAN_SDK: C:\VulkanSDK\
      triplet: arm64-windows
      vcpkg_baseline: c16c1bd46c7f6de21efc6dcf19c1069d6825df23
      VCPKG_INSTALLED_DIR: ./vcpkg_installed/
      dep_folder: deps
      libplacebo_tag: v7.360.1
      QT_VERSION: "6.9.*"

    defaults:
      run:
        shell: powershell

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup Vulkan
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $latest = Invoke-RestMethod -UseBasicParsing -Uri "https://vulkan.lunarg.com/sdk/latest.json"
          $ver = $latest.windows
          echo Version $ver
          Invoke-WebRequest -UseBasicParsing -Uri "https://sdk.lunarg.com/sdk/download/$ver/warm/InstallVulkanARM64-$ver.exe" -OutFile VulkanSDK.exe
          echo Downloaded
          .\VulkanSDK.exe --root ${{ env.VULKAN_SDK }}  --accept-licenses --default-answer --confirm-command install

      - name: Set up Ninja
        run: choco install ninja

      - name: Set up Clang
        uses: aminya/setup-cpp@v1
        with:
          compiler: llvm-18
          vcvarsall: true
          cmake: true
          ninja: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: arm64

      - name: Set CXX, CC, CXXFLAGS, and CFLAGS
        run: |
            echo "CXX=clang-cl.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            echo "CC=clang-cl.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            echo "CXXFLAGS=-fuse-ld=lld-link" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            echo "CFLAGS=-fuse-ld=lld-link" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: "arm64"

      - name: Install pip dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade setuptools wheel
          python3 -m pip install --user --upgrade scons protobuf pyinstaller
          python3 -m pip install --user --upgrade meson
          python3 -m pip install --user git+https://github.com/streetpea/aqtinstall.git
          python3 -c 'import google.protobuf; print(google.protobuf.__file__)'

      - name: Setup Qt
        run: |
            python3 -m aqt install-qt windows desktop "${env:QT_VERSION}" win64_msvc2022_arm64_cross_compiled --autodesktop --outputdir "${{ github.workspace }}\..\Qt" -m qtpositioning qtwebchannel qtwebsockets qtserialport
            echo "${{ github.workspace }}\..\Qt\${env:QT_VERSION}\win64_msvc2022_arm64_cross_compiled\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            echo "QT_ROOT_DIR=${{ github.workspace }}\..\Qt\${env:QT_VERSION}\win64_msvc2022_arm64_cross_compiled\" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            echo "QT_PLUGIN_PATH=${{ github.workspace }}\..\Qt\${env:QT_VERSION}\win64_msvc2022_arm64_cross_compiled\plugins" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            echo "QML2_IMPORT_PATH=${{ github.workspace }}\..\Qt\${env:QT_VERSION}\win64_msvc2022_arm64_cross_compiled\qml" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup ffmpeg
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -UseBasicParsing -Uri "https://github.com/streetpea/FFmpeg-Builds/releases/download/latest/ffmpeg-n7.1-latest-winarm64-gpl-shared-7.1.zip" -OutFile ".\ffmpeg-n7.1-latest-winarm64-gpl-shared-7.1.zip"
          Expand-Archive -LiteralPath "ffmpeg-n7.1-latest-winarm64-gpl-shared-7.1.zip" -DestinationPath "."
          Rename-Item "ffmpeg-n7.1-latest-winarm64-gpl-shared-7.1.zip" "${{ env.dep_folder }}"

      - name: Build SPIRV-Cross
        run: |
          git clone https://github.com/KhronosGroup/SPIRV-Cross.git
          cd SPIRV-Cross
          cmake `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}\${{ env.dep_folder }}" `
          -DSPIRV_CROSS_SHARED=ON `
          -S . `
          -B build `
          -G Ninja
          cmake --build build --config Release
          cmake --install build

      - name: Setup shaderc
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $url = ((Invoke-WebRequest -UseBasicParsing -Uri "https://storage.googleapis.com/shaderc/badges/build_link_windows_vs2019_release.html").Content | Select-String -Pattern 'url=(.*)"').Matches.Groups[1].Value
          Invoke-WebRequest -UseBasicParsing -Uri $url -OutFile .\shaderc.zip
          Expand-Archive -LiteralPath "shaderc.zip" -DestinationPath "."
          cp "./install/*" "./${{ env.dep_folder }}" -Force -Recurse
          rm "./install" -r -force

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.vcpkg_baseline }}
          runVcpkgInstall: true
          vcpkgJsonGlob: "vcpkg.json"

      - name: Build libplacebo
        run: |
          git clone --recursive https://github.com/haasn/libplacebo.git
          cd libplacebo
          git checkout --recurse-submodules ${{ env.libplacebo_tag }}
          git apply --ignore-whitespace --verbose ../scripts/flatpak/0002-Vulkan-use-16bit-for-p010.patch
          meson setup `
          --prefix "${{ github.workspace }}\${{ env.dep_folder }}" `
          --native-file ../meson.ini `
          "--pkg-config-path=['${{ github.workspace }}\vcpkg_installed\${{ env.triplet }}\lib\pkgconfig','${{ github.workspace }}\vcpkg_installed\${{ env.triplet }}\share\pkgconfig','${{ github.workspace }}\${{ env.dep_folder }}\lib\pkgconfig']" `
          "--cmake-prefix-path=['${{ github.workspace }}\vcpkg_installed\${{ env.triplet }}', '${{ env.VULKAN_SDK }}', '${{ github.workspace }}\${{ env.dep_folder }}']" `
          -Dc_args="/I ${{ env.VULKAN_SDK }}Include" `
          -Dcpp_args="/I ${{ env.VULKAN_SDK }}Include" `
          -Dc_link_args="/LIBPATH:${{ env.VULKAN_SDK }}Lib" `
          -Dcpp_link_args="/LIBPATH:${{ env.VULKAN_SDK }}Lib" `
          -Ddemos=false `
          ./build
          ninja -C./build
          ninja -C./build install

      - name: Apply Patches
        run: |
          git apply --ignore-whitespace --verbose --directory=third-party/gf-complete/ scripts/windows-vc/gf-complete.patch
          git apply --ignore-whitespace --verbose scripts/windows-vc/libplacebo-pc.patch

      - name: Configure NXGS Gaming
        run: |
          cmake `
          -S . `
          -B build `
          -G Ninja `
          -DCMAKE_TOOLCHAIN_FILE:STRING="vcpkg/scripts/buildsystems/vcpkg.cmake" `
          -DCMAKE_EXPORT_COMPILE_COMMANDS:BOOL=TRUE `
          -DCMAKE_BUILD_TYPE=Release `
          -DCHIAKI_ENABLE_CLI=OFF `
          -DCHIAKI_GUI_ENABLE_SDL_GAMECONTROLLER=ON `
          -DCHIAKI_ENABLE_STEAMDECK_NATIVE=OFF `
          -DPYTHON_EXECUTABLE="${{ env.pythonLocation }}\python.exe" `
          -DCMAKE_PREFIX_PATH="${{ github.workspace }}\${{ env.dep_folder }};${{ env.VULKAN_SDK }}"

      - name: Build NXGS Gaming
        run: |
          cmake --build build --config Release --clean-first --target chiaki

      - name: Prepare Qt deployment package
        run: |
          mkdir NXGS-Gaming-Win
          cp build\gui\chiaki.exe "NXGS-Gaming-Win\NXGS Gaming.exe"
          cp build\third-party\cpp-steam-tools\cpp-steam-tools.dll NXGS-Gaming-Win
          cp "${{ github.workspace }}\vcpkg_installed\${{ env.triplet }}\bin\libcrypto-*.dll" NXGS-Gaming-Win
          cp "${{ github.workspace }}\vcpkg_installed\${{ env.triplet }}\bin\libssl-*.dll" NXGS-Gaming-Win
          cp "${{ github.workspace }}\vcpkg_installed\${{ env.triplet }}\bin\SDL2.dll" NXGS-Gaming-Win
          cp "${{ github.workspace }}\vcpkg_installed\${{ env.triplet }}\bin\hidapi.dll" NXGS-Gaming-Win
          cp "${{ github.workspace }}\vcpkg_installed\${{ env.triplet }}\bin\fftw3.dll" NXGS-Gaming-Win
          cp "${{ github.workspace }}\vcpkg_installed\${{ env.triplet }}\bin\opus.dll" NXGS-Gaming-Win
          cp "${{ github.workspace }}\vcpkg_installed\${{ env.triplet }}\bin\libspeexdsp.dll" NXGS-Gaming-Win
          cp "${{ github.workspace }}\vcpkg_installed\${{ env.triplet }}\bin\lcms2.dll" NXGS-Gaming-Win
          cp "${{ github.workspace }}\vcpkg_installed\${{ env.triplet }}\bin\miniupnpc.dll" NXGS-Gaming-Win
          cp "${{ github.workspace }}\vcpkg_installed\${{ env.triplet }}\bin\json-c.dll" NXGS-Gaming-Win
          cp "${{ github.workspace }}\${{ env.dep_folder }}\bin\swresample-*.dll" NXGS-Gaming-Win
          cp "${{ github.workspace }}\${{ env.dep_folder }}\bin\avcodec-*.dll" NXGS-Gaming-Win
          cp "${{ github.workspace }}\${{ env.dep_folder }}\bin\avutil-*.dll" NXGS-Gaming-Win
          cp "${{ github.workspace }}\${{ env.dep_folder }}\bin\avformat-*.dll" NXGS-Gaming-Win
          cp "${{ github.workspace }}\${{ env.dep_folder }}\bin\libplacebo-*.dll" NXGS-Gaming-Win
          cp "${{ github.workspace }}\${{ env.dep_folder }}\bin\shaderc_shared.dll" NXGS-Gaming-Win
          cp "${{ github.workspace }}\${{ env.dep_folder }}\bin\spirv-cross-c-shared.dll" NXGS-Gaming-Win
          windeployqt.exe --no-translations --qmldir=gui\src\qml --release "NXGS-Gaming-Win\NXGS Gaming.exe"
          cp COPYING NXGS-Gaming-Win
          cp README.md NXGS-Gaming-Win
          cp LICENSES NXGS-Gaming-Win\LICENSES -Recurse
          @"
          NXGS Gaming source code availability

          The complete corresponding source code for NXGS Gaming is available at:
          https://github.com/soowankispassah/nxgs_gaming

          NXGS Gaming is a fork of chiaki-ng, which is based on Chiaki. This fork is distributed under the GNU Affero General Public License v3.0.

          NXGS Gaming is not affiliated with, endorsed by, sponsored by, or certified by Sony Interactive Entertainment LLC, PlayStation, chiaki-ng, Chiaki, or the original maintainers.
          "@ | Out-File -FilePath NXGS-Gaming-Win\SOURCE_CODE.txt -Encoding utf8

      - name: Package NXGS Gaming
        run: |
          $CHIAKI_VERSION_MAJOR = (Select-String -Path .\CMakeLists.txt -Pattern 'set\(CHIAKI_VERSION_MAJOR ([0-9]+)\)') | %{$_.Matches.Groups[1].value}
          $CHIAKI_VERSION_MINOR = (Select-String -Path .\CMakeLists.txt -Pattern 'set\(CHIAKI_VERSION_MINOR ([0-9]+)\)') | %{$_.Matches.Groups[1].value}
          $CHIAKI_VERSION_PATCH = (Select-String -Path .\CMakeLists.txt -Pattern 'set\(CHIAKI_VERSION_PATCH ([0-9]+)\)') | %{$_.Matches.Groups[1].value}
          $RELEASE_PACKAGE_FILE = "nxgs-gaming-win_arm64-VC-portable-$CHIAKI_VERSION_MAJOR.$CHIAKI_VERSION_MINOR.$CHIAKI_VERSION_PATCH-test-build-${{ github.sha }}.zip"
          Compress-Archive NXGS-Gaming-Win $RELEASE_PACKAGE_FILE
          $release_filepath = Get-ChildItem $RELEASE_PACKAGE_FILE | %{$_[0].FullName}
          echo "RELEASE_PACKAGE_PATH=$release_filepath" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload NXGS Gaming Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nxgs-gaming-win_arm64-VC-Release
          path: ${{ env.RELEASE_PACKAGE_PATH }}
          if-no-files-found: error
          retention-days: 7
